# Builds the Astro site and deploys it to GitHub Pages on every push to main.
# You don't run anything manually — push code, and GitHub does the rest.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy by hand from the Actions tab

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3 # installs deps, builds, uploads the artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
